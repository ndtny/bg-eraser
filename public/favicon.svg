<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <clipPath id="clip">
      <path d="M6 4C6 2.9 6.9 2 8 2h16c1.1 0 2 .9 2 2v24c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V4z"/>
    </clipPath>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Checkered pattern (left half) = transparent bg -->
  <g clip-path="url(#clip)" opacity="0.3">
    <rect x="6" y="2" width="5" height="5" fill="white"/>
    <rect x="16" y="2" width="5" height="5" fill="white"/>
    <rect x="11" y="7" width="5" height="5" fill="white"/>
    <rect x="6" y="12" width="5" height="5" fill="white"/>
    <rect x="16" y="12" width="5" height="5" fill="white"/>
    <rect x="11" y="17" width="5" height="5" fill="white"/>
    <rect x="6" y="22" width="5" height="5" fill="white"/>
    <rect x="16" y="22" width="5" height="5" fill="white"/>
    <rect x="21" y="7" width="5" height="5" fill="white"/>
    <rect x="21" y="17" width="5" height="5" fill="white"/>
  </g>
  <!-- Person silhouette (right half, solid) -->
  <circle cx="18" cy="11" r="4" fill="white"/>
  <path d="M11 28c0-5.5 3.1-10 7-10s7 4.5 7 10" fill="white"/>
  <!-- Diagonal eraser line -->
  <line x1="4" y1="28" x2="28" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
